<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <title>Creare cont</title>
    <link rel="stylesheet" href="/Frontend/css/administrator.css">
</head>

<body>

    <div class="container">
        <div class="header">Creare cont</div>
        <form class="form">
            <input type="email" name="email" placeholder="mail" required>

            <small>Parola trebuie să conțină cel puțin 8 caractere</small>
            <input type="password" name="password" placeholder="parola" required>

            <small>Confirmă parola</small>
            <input type="password" name="confirm_password" placeholder="confirmă parola" required>

            <button class="btn" type="submit">CREEAZĂ CONT</button>
        </form>
        <div id="error-message"></div>

    </div>

    <script>
        const form = document.querySelector('.form');
        const errorDiv = document.getElementById('error-message');

        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function hideError() {
            errorDiv.style.display = 'none';
        }

        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            hideError();

            const formData = new FormData(form);
            const email = formData.get("email");
            const password = formData.get("password");
            const confirmPassword = formData.get("confirm_password");

            if (password !== confirmPassword) {
                showError("Parolele nu se potrivesc!");
                return;
            }

            if (password.length < 8) {
                showError("Parola trebuie să aibă cel puțin 8 caractere");
                return;
            }


            // Transmite Datele la backend
            try {
                const response = await fetch('http://localhost:3000/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
                });

                if (response.ok) {
                    window.location.href = './login.html';
                } else {
                    const errorText = await response.text();
                    showError(errorText || "Eroare la înregistrare. Încercați din nou.");
                }
            } catch (error) {
                showError("Eroare de conexiune!");
                console.error(error);
            }
        });
    </script>

</body>

</html>
