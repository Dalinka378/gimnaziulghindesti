<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Orarul – Gimnaziul „M. Eminescu” Ghindești</title>
  <link rel="stylesheet" href="site.css" />
</head>
<body>
  <div class="top-mini">
    <div class="top-mini__inner">
      <div class="top-left">
        <button class="top-icon-btn" type="button" id="themeMiniBtn" aria-label="Schimbă tema (Dark/Light)" aria-pressed="false" title="Dark/Light">
          <svg class="theme-icon" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
            <g class="theme-icon__sun">
              <circle cx="12" cy="12" r="4.8" fill="none" stroke="currentColor" stroke-width="2"/>
              <path d="M12 2.7v2.1M12 19.2v2.1M2.7 12h2.1M19.2 12h2.1M5.1 5.1l1.5 1.5M17.4 17.4l1.5 1.5M18.9 5.1l-1.5 1.5M6.6 17.4l-1.5 1.5"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </g>
            <g class="theme-icon__moon">
              <path d="M15.7 3.5c-1.2 1.8-1.6 4.1-.8 6.2.9 2.5 3.2 4.2 5.8 4.5-1.1 3.9-4.7 6.8-8.9 6.8-5.1 0-9.2-4.1-9.2-9.2 0-4.6 3.4-8.5 7.8-9.1 2-.3 3.8.1 5.3.8Z"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            </g>
          </svg>
        </button>

        <div class="lang" aria-label="Limbi">
          <button class="lang__btn is-active" type="button" data-lang="RO">RO</button>
          <button class="lang__btn" type="button" data-lang="RU">RU</button>
          <button class="lang__btn" type="button" data-lang="EN">EN</button>
        </div>
      </div>

      <div class="top-center" aria-hidden="true"></div>

      <div class="top-right">
        <a class="top-icon-link" href="#" aria-label="Acces administrator" title="Acces administrator">
          <svg class="admin-icon" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 12c2.761 0 5-2.239 5-5s-2.239-5-5-5-5 2.239-5 5 2.239 5 5 5Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M4 22c0-4.418 3.582-8 8-8s8 3.582 8 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </a>
      </div>
    </div>
  </div>

  <header class="header">
    <div class="header__inner">
      <a class="logo" href="site.html" aria-label="Logo">
        <span class="logo__text">LOGO</span>
      </a>

      <nav class="nav" aria-label="Navigare principală">
        <a class="nav__link" href="#">Contacte</a>

        <div class="nav__group" id="studiesGroup">
          <button class="nav__link nav__link--btn" type="button" id="studiesBtn" aria-haspopup="true" aria-expanded="false">
            Proces de studii <span class="caret" aria-hidden="true">▼</span>
          </button>
          <div class="dropdown" id="studiesDropdown" role="menu" aria-label="Proces de studii">
            <a class="dropdown__item" role="menuitem" href="orar.html">Orarul</a>
            <a class="dropdown__item" role="menuitem" href="#">Transportarea</a>
            <a class="dropdown__item" role="menuitem" href="#">Alimentarea</a>
            <a class="dropdown__item" role="menuitem" href="#">Activități extrașcolare</a>
            <a class="dropdown__item" role="menuitem" href="#">Consiliul elevilor</a>
          </div>
        </div>
      </nav>

      <div class="header__actions">
        <button class="icon-btn" type="button" aria-label="Căutare">
          <span class="icon icon--search" aria-hidden="true"></span>
        </button>
        <button class="icon-btn" type="button" id="menuBtn" aria-label="Meniu" aria-controls="sidePanel" aria-expanded="false">
          <span class="icon icon--hamburger" aria-hidden="true"></span>
        </button>
      </div>
    </div>
  </header>

  <main class="main page--orar" aria-label="Orarul">
    <div class="orar-wrap">
      <div class="orar-card orar-card--left">
        <div class="orar-title">ORARUL</div>
        <div class="orar-cols">
          <div class="orar-col">
            <a class="orar-link" href="#">Clasa 1</a>
            <a class="orar-link" href="#">Clasa 2</a>
            <a class="orar-link" href="#">Clasa 3</a>
            <a class="orar-link" href="#">Clasa 4</a>
          </div>
          <div class="orar-col">
            <a class="orar-link" href="#">Clasa 5</a>
            <a class="orar-link" href="#">Clasa 6</a>
            <a class="orar-link" href="#">Clasa 7</a>
            <a class="orar-link" href="#">Clasa 8</a>
            <a class="orar-link" href="#">Clasa 9</a>
          </div>
        </div>
      </div>

      <div class="orar-card orar-card--right">
        <div class="orar-title orar-title--right">ORARUL SUNETELOR</div>
      </div>
    </div>

    <aside class="side-panel" id="sidePanel" aria-label="Panou lateral">
      <div class="side-panel__inner">
        <div class="side-panel__spacer"></div>
        <div class="side-panel__menu">
          <div class="side-panel__title">Blog</div>
          <a class="side-panel__item" href="#">- Noutăți</a>
          <a class="side-panel__item" href="#">- Profesori</a>
          <a class="side-panel__item" href="#">- Despre noi</a>
          <a class="side-panel__item" href="#">- Promoții</a>
        </div>
      </div>
    </aside>
  </main>

  <script src="site.js"></script>
</body>
</html>
