<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Autentificare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header">Autentificare</div>

    <form class="form" action="http://localhost:3000/register" method="POST">
        <input type="email" name="email" placeholder="mail" required>

        <small>Parola trebuie să conțină cel puțin 8 caractere</small>
        <input type="password" name="password" placeholder="parola" required>

        <small>Parola trebuie să conțină cel puțin 8 caractere</small>
        <input type="password" name="confirm_password" placeholder="confirmă parola" required>

        <button class="btn" type="submit">CONTINUĂ</button>
    </form>
</div>

</body>
</html>
